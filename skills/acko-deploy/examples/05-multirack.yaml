# Scenario 5: 6-Node Multi-Rack Cluster with Zone-Aware Topology
#
# Description:
#   Cluster spread across 3 availability zones for high availability.
#   Rack-aware replication ensures replicas are placed in different zones,
#   surviving a full zone failure without data loss.
#   Total pods (6) are evenly distributed: 2 pods per rack.
#
# Prerequisites:
#   kubectl create namespace aerospike
#   Kubernetes nodes must be labeled with topology.kubernetes.io/zone
#
# Deploy:
#   kubectl apply -f 05-multirack.yaml
#
# Verify:
#   kubectl get asc aerospike-multirack -n aerospike -w
#   kubectl get pods -n aerospike -o wide   # Check node/zone distribution
#
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-multirack
  namespace: aerospike
spec:
  size: 6                           # Total pods across ALL racks (CE max: 8)
  image: aerospike:ce-8.1.1.1       # 6 pods / 3 racks = 2 pods per rack

  rackConfig:
    namespaces:
      - testns                      # Only this namespace uses rack-aware replication
    racks:
      - id: 1                       # Rack ID must be > 0 and unique
        zone: us-east1-a            # Pins rack-1 pods to availability zone A
      - id: 2
        zone: us-east1-b            # Pins rack-2 pods to availability zone B
      - id: 3
        zone: us-east1-c            # Pins rack-3 pods to availability zone C

  podSpec:
    aerospikeContainer:
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "500m"

  storage:
    volumes:
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard
            size: 5Gi
        aerospike:
          path: /opt/aerospike/data
        cascadeDelete: false         # Retain PVCs after CR deletion (manual cleanup required)
        # To clean up manually: kubectl delete pvc -n aerospike -l aerospike.io/cr-name=aerospike-multirack

  aerospikeConfig:
    service:
      cluster-name: aerospike-multirack
      proto-fd-max: 15000

    network:
      service:
        address: any
        port: 3000
      heartbeat:
        mode: mesh
        port: 3002
      fabric:
        address: any
        port: 3001

    namespaces:
      - name: testns
        replication-factor: 2       # Replicas placed in different racks/zones
        storage-engine:
          type: device
          file: /opt/aerospike/data/testns.dat
          filesize: 4294967296      # 4 GiB
